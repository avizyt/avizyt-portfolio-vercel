    <path class="face-skin" d="M 120 150 Q 150 130 180 150 Q 210 200 180 350 Q 150 370 120 350 Q 90 200 120 150 Z"/>
    
    <path class="thick-line" d="M 100 170 Q 120 160 140 170 Q 160 160 180 170"/> <path class="line-work" d="M 100 170 A 20 20 0 0 0 140 170 Z"/> <path class="line-work" d="M 140 170 A 20 20 0 0 0 180 170 Z"/> <circle cx="115" cy="180" r="5"/> <circle cx="165" cy="180" r="5"/> <path class="stipple" d="[M 115 180 l 0.5 0 M 116 181 l 0.5 0 ...]"/> <path class="line-work" d="M 130 190 Q 140 230 150 190"/> <path class="line-work thick-line" d="M 125 240 Q 140 255 155 240"/> <path class="stipple" d="[M 130 220 l 0.5 0 ...]"/> <path class="line-work" d="M 105 260 Q 140 255 175 260"/> <path class="stipple" d="[M 110 265 l 0.5 0 ...]"/> <path class="line-work" d="M 115 285 Q 140 300 165 285"/> <path class="scribble" d="[M 120 350 c c c ... complex scribble patterns for beard]"/>

