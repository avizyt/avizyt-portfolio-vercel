    <circle cx="140" cy="350" r="10" stroke="black" fill="white"/> <path class="collar-cross" d="M 90 340 L 190 420 M 100 330 L 200 410 ... "/> <path class="scribble" d="[M 80 330 c c c ... complex collar scribble]"/>
  </g>
</svg>
